name: Update Repo Cards

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build README repo cards
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER: KSNAM97
          THEME: github_dark
        run: |
          python3 <<'PYEOF'
          import json, os, re, subprocess

          user = os.environ["USER"]
          theme = os.environ["THEME"]

          raw = subprocess.check_output(
              ["gh", "api", f"users/{user}/repos?sort=updated&per_page=100"],
              text=True,
          )
          repos = json.loads(raw)

          names = [
              r["name"] for r in repos
              if not r["fork"] and r["name"] != user
          ]

          cells = []
          for name in names:
              card = (
                  f'<a href="https://github.com/{user}/{name}">'
                  f'<img width="100%" '
                  f'src="https://github-readme-stats.vercel.app/api/pin/'
                  f'?username={user}&repo={name}'
                  f'&theme={theme}&hide_border=true&bg_color=0d1117" /></a>'
              )
              cells.append(card)

          if cells:
              rows = []
              for i in range(0, len(cells), 2):
                  pair = cells[i:i+2]
                  tds = "".join(f'<td width="50%" valign="top">{c}</td>' for c in pair)
                  rows.append(f"<tr>{tds}</tr>")
              cards = "<table>\n" + "\n".join(rows) + "\n</table>"
          else:
              cards = "_아직 표시할 리포가 없습니다._"

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          block = "<!-- REPO-LIST:START -->\n" + cards + "\n<!-- REPO-LIST:END -->"
          new_content = re.sub(
              r"<!-- REPO-LIST:START -->.*?<!-- REPO-LIST:END -->",
              block,
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_content)

          print("Updated cards for:", names)
          PYEOF

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: auto-update repo cards"
          git pull --rebase origin main
          git push
