name: Update Repo Cards

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build README repo cards
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER: KSNAM97
          THEME: github_dark
        run: |
          python3 - <<'PYEOF'
          import json, os, re, subprocess

          user  = os.environ["USER"]
          theme = os.environ["THEME"]

          raw = subprocess.check_output(
              ["gh", "api", f"users/{user}/repos?sort=updated&per_page=100"],
              text=True,
          )
          repos = json.loads(raw)

          names = [
              r["name"] for r in repos
              if not r["fork"] and r["name"] != user
          ]

            lines, row = [], []
          for name in names:
              card = (
                  f'<a href="https://github.com/{user}/{name}">'
                  f'<img width="400" '
                  f'src="https://github-readme-stats.vercel.app/api/pin/'
                  f'?username={user}&repo={name}&theme={theme}" /></a>'
              )
              row.append(card)
              if len(row) == 2:
                  lines.append("".join(row))
                  row = []
          if row:
              lines.append("".join(row))

          cards = "\n".join(lines) if lines else "_아직 표시할 리포가 없습니다._"

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          block = "<!-- REPO-LIST:START -->\n" + cards + "\n<!-- REPO-LIST:END -->"
          new_content = re.sub(
              r"<!-- REPO-LIST:START -->.*?<!-- REPO-LIST:END -->",
              block,
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_content)

          print("Updated cards for:", names)
          PYEOF

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto-update repo cards"
          git push
